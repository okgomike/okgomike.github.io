<script type="application/ld+json">
{{ if eq .Type "products" }}
  {{ if .IsList }}
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "url": "{{ .Permalink }}",
      "name": "{{ .Title }}",
      "description": "{{ $desc }}",
      "itemListElement": [
        {{ $productItems := slice }}
        {{ range first 10 .Pages }}
        {{ $productItems = $productItems | append (dict
          "@type" "ListItem"
          "position" .Position
          "item" (dict
            "@type" "Product"
            "name" .Title
            "url" .Permalink
          )
        ) }}
        {{ end }}
        {{ $productItems | jsonify }}
      ]
    }
  {{ else }}
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "url": "{{ .Permalink }}",
      "name": "{{ .Title }}",
      "description": "{{ $desc }}",
      "brand": { "@type": "Brand", "name": "{{ .Site.Params.brand }}" },
      {{ if .Params.image }}"image": "{{ .Params.image | absURL }}",{{ end }}
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/InStock",
        "priceCurrency": "USD",
        {{ if .Params.price_range }}"price": "{{ index (split .Params.price_range "-") 0 }}",{{ else }}"price": "0.5",{{ end }}
        {{ if .Params.moq }}"description": "MOQ: {{ .Params.moq }}"{{ end }}
      }
    }
  {{ end }}
{{ else if .IsHome }}
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "{{ .Permalink }}",
    "name": "{{ .Site.Title }}",
    "description": "{{ $desc }}"
  }
{{ else }}
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "url": "{{ .Permalink }}",
    "name": "{{ .Title }}",
    "description": "{{ $desc }}"
  }
{{ end }}
</script>
