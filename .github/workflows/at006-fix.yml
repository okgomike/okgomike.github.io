name: Fix Product MD YAML (One-Time)

on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix YAML in all product MD files (using safe_dump)
        run: |
          pip install pyyaml
          python3 << 'PYEOF'
          import yaml, os, glob

          files = sorted(glob.glob('content/products/*.md'))
          fixed = 0
          errors = 0
          print(f'Scanning {len(files)} product files...\n')

          for path in files:
              name = os.path.basename(path)
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      content = f.read()

                  if not content.startswith('---'):
                      print(f'❌ {name}: no front matter')
                      errors += 1
                      continue

                  parts = content.split('---', 2)
                  if len(parts) < 3:
                      print(f'❌ {name}: malformed front matter')
                      errors += 1
                      continue

                  fm = yaml.safe_load(parts[1])
                  body = parts[2].lstrip('\n')

                  # Use yaml.dump() — handles ALL escaping correctly
                  fm_yaml = yaml.dump(fm, default_flow_style=False,
                                      allow_unicode=True, sort_keys=False,
                                      indent=2, width=200).rstrip('\n')
                  new_content = '---\n' + fm_yaml + '\n---\n' + body
                  # Ensure single trailing newline
                  if not new_content.endswith('\n'):
                      new_content += '\n'

                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(new_content)

                  fixed += 1
                  print(f'✅ {name}')

              except Exception as e:
                  print(f'❌ {name}: {e}')
                  errors += 1

          print(f'\n=== {fixed} fixed, {errors} errors ===')

          # Clean up all one-time scripts
          cleanup = [
              'fix_products_seo.py',
              'fix_yaml_colons.py',
              '.github/workflows/fix-products-seo.yml',
              '.github/workflows/fix-yaml-colons.yml',
              '.github/workflows/at006-fix.yml'
          ]
          for f in cleanup:
              if os.path.exists(f):
                  os.remove(f)
                  print(f'🧹 Removed {f}')

          PYEOF

      - name: Commit & Push
        run: |
          git config user.name "okgomike"
          git config user.email "okgomike@users.noreply.github.com"
          git diff --stat
          git add -A
          git commit -m "fix: rewrite all product front matter with yaml.dump (fix YAML quoting)" || echo "No changes"
          git push
