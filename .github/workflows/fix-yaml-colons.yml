name: Fix YAML Colons (One-Time)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run YAML fix script
        run: python fix_yaml_colons.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/products/
          git diff --staged --quiet || git commit -m "fix: reformat YAML front matter to escape colons properly [skip ci]"
          git push

      # 清理：删除一次性脚本（包括之前的）
      - name: Cleanup one-time scripts
        run: |
          rm -f fix_products_seo.py fix_yaml_colons.py
          rm -f .github/workflows/fix-products-seo.yml .github/workflows/fix-yaml-colons.yml
          git add -A
          git diff --staged --quiet && echo "No cleanup needed" || (git commit -m "chore: remove one-time fix scripts [skip ci]" && git push)
